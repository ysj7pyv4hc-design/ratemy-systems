# Render Blueprint — powers the one-click "Deploy to Render" button.
# Render reads this file and provisions everything: the web service, a managed
# Postgres database, and all env vars (it generates and PERSISTS the three secrets
# itself, so nobody pastes secrets). Edit config/*.yaml → git push → auto-redeploy.
#
# Plans are set to FREE so the one-click deploy always succeeds at $0. To keep data
# beyond the free window and stop cold-starts, upgrade the database and web service
# to a paid tier in the Render dashboard (one click) — see DEPLOY.md.

databases:
  - name: ratemy-db
    databaseName: ratemy
    user: ratemy
    plan: free            # upgrade to keep data long-term (free Postgres is time-limited)

services:
  - type: web
    name: ratemy-systems
    runtime: python
    plan: free            # upgrade to 'starter' to stay always-on (free spins down when idle)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RMS_ENV
        value: prod
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TRUSTED_PROXY_HOPS
        value: "1"
      - key: MAIL_PROVIDER
        value: disabled        # anonymous launch; set to smtp + SMTP_* later to enable sign-in
      - key: PUBLISH_INTERVAL_MINUTES
        value: "1440"          # scores refresh daily, in-process (no external cron needed)
      - key: DATABASE_URL
        fromDatabase:
          name: ratemy-db
          property: connectionString
      - key: RMS_PEPPER          # generated once by Render and kept stable forever
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: JOB_TOKEN
        generateValue: true
      - key: BASE_URL
        sync: false            # set to your live URL after first deploy (or custom domain)
